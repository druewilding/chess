<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>♔ Chess</h1>

    <div class="lobby">
      <div class="card">
        <h2>New Game</h2>
        <button id="btn-new-standard" class="btn btn-primary">Standard Chess</button>
        <!-- Future variant buttons -->
        <!-- <button id="btn-new-960" class="btn btn-secondary">Chess 960</button> -->
        <!-- <button id="btn-new-limited" class="btn btn-secondary">Limited Range</button> -->
      </div>

      <div class="card">
        <h2>Join Game</h2>
        <div class="join-form">
          <input type="text" id="game-id-input" placeholder="Enter game code" maxlength="8" autocomplete="off">
          <button id="btn-join" class="btn btn-primary">Join</button>
        </div>
      </div>
    </div>

    <div id="error-message" class="error-message" hidden></div>

    <!-- Waiting screen shown after creating a game -->
    <div id="waiting-screen" class="card" hidden>
      <h2>Waiting for opponent...</h2>
      <p>Share this link with your opponent:</p>
      <div class="share-link-container">
        <input type="text" id="share-link" readonly>
        <button id="btn-copy-link" class="btn btn-small">Copy</button>
      </div>
      <p class="game-code">Game code: <strong id="game-code-display"></strong></p>
    </div>
  </div>

  <script type="module">
    import { ChessEngine } from './js/chess-engine.js';
    import { GameManager } from './js/game-manager.js';

    const gm = new GameManager();
    const engine = new ChessEngine();
    let initialized = false;

    async function ensureInit() {
      if (!initialized) {
        await gm.init();
        initialized = true;
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg;
      el.hidden = false;
      setTimeout(() => { el.hidden = true; }, 5000);
    }

    // Check if there's a game ID in the URL (someone shared a direct link to index.html)
    const params = new URLSearchParams(window.location.search);
    if (params.get('id')) {
      window.location.href = `game.html?id=${params.get('id')}`;
    }

    // New standard game
    document.getElementById('btn-new-standard').addEventListener('click', async () => {
      try {
        await ensureInit();
        const gameId = await gm.createGame('standard');

        // Write the initial board state right away so both players see it immediately
        engine.reset();
        await gm.sendGameState(engine.serialize());

        // Show waiting screen
        document.querySelector('.lobby').hidden = true;
        const waitingScreen = document.getElementById('waiting-screen');
        waitingScreen.hidden = false;

        const shareLink = gm.getShareLink();
        document.getElementById('share-link').value = shareLink;
        document.getElementById('game-code-display').textContent = gameId;

        // Listen for opponent joining
        gm.onPlayerJoined = (data) => {
          if (data.players?.black) {
            window.location.href = `game.html?id=${gameId}&color=white`;
          }
        };
      } catch (err) {
        showError('Failed to create game: ' + err.message);
      }
    });

    // Join game
    document.getElementById('btn-join').addEventListener('click', async () => {
      const gameId = document.getElementById('game-id-input').value.trim().toLowerCase();
      if (!gameId) {
        showError('Please enter a game code');
        return;
      }
      try {
        await ensureInit();
        await gm.joinGame(gameId);
        window.location.href = `game.html?id=${gameId}&color=black`;
      } catch (err) {
        showError(err.message);
      }
    });

    // Allow Enter key in input
    document.getElementById('game-id-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-join').click();
    });

    // Copy link
    document.getElementById('btn-copy-link').addEventListener('click', () => {
      const linkInput = document.getElementById('share-link');
      navigator.clipboard.writeText(linkInput.value).then(() => {
        document.getElementById('btn-copy-link').textContent = 'Copied!';
        setTimeout(() => { document.getElementById('btn-copy-link').textContent = 'Copy'; }, 2000);
      });
    });
  </script>
</body>
</html>
